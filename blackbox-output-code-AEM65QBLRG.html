<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mira Bhayandar Smart Logistics Platform</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-truck-loading"></i>
                <h1>SmartLogix MB</h1>
            </div>
            <div class="header-stats">
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <span id="pendingCount">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calendar-check"></i>
                    <span id="scheduledCount">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-shipping-fast"></i>
                    <span id="inTransitCount">0</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <span id="deliveredCount">0</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Schedule Form -->
            <div class="form-section">
                <h2><i class="fas fa-plus-circle"></i> Schedule New Delivery</h2>
                <form id="deliveryForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Material Type</label>
                            <select id="materialType" required>
                                <option value="">Select Material</option>
                                <option value="Cement">Cement (Bags)</option>
                                <option value="Bricks">Bricks</option>
                                <option value="Sand">Sand (Tons)</option>
                                <option value="Steel">Steel Bars</option>
                                <option value="Aggregates">Aggregates</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" id="quantity" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Supplier</label>
                            <input type="text" id="supplierName" placeholder="Supplier Name" required>
                        </div>
                        <div class="form-group">
                            <label>Vehicle No.</label>
                            <input type="text" id="vehicleNumber" placeholder="MH-04-XXXX" required>
                        </div>
                        <div class="form-group">
                            <label>Destination Site</label>
                            <select id="destinationSite" required>
                                <option value="">Select Site</option>
                                <option value="Penkar Pada">Penkar Pada</option>
                                <option value="Mira Road">Mira Road</option>
                                <option value="Bhayandar East">Bhayandar East</option>
                                <option value="Kashimira">Kashimira</option>
                                <option value="Ghodbunder Road">Ghodbunder Road</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Scheduled Time</label>
                            <input type="datetime-local" id="scheduledTime" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-calendar-plus"></i> Schedule Delivery
                    </button>
                </form>
            </div>

            <!-- Deliveries Table -->
            <div class="table-section">
                <h2><i class="fas fa-list"></i> Active Deliveries</h2>
                <div class="table-container">
                    <table id="deliveriesTable">
                        <thead>
                            <tr>
                                <th>Material</th>
                                <th>Site</th>
                                <th>Vehicle</th>
                                <th>Quantity</th>
                                <th>Scheduled</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="deliveriesBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Map Placeholder -->
        <div class="map-section">
            <div id="mapPlaceholder">
                <i class="fas fa-map-marker-alt"></i>
                <h3>GPS Tracking (Coming Soon)</h3>
                <p>Real-time vehicle location tracking</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
